name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
            use_cross: false

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: linux-x64-musl
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact: android-arm64
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
            use_cross: false

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Get cross SHAs
        if: matrix.use_cross
        id: cross-sha
        shell: bash
        run: |
          echo "cross=$(git ls-remote https://github.com/cross-rs/cross HEAD | cut -f1)" >> $GITHUB_OUTPUT
          echo "toolchains=$(git ls-remote https://github.com/cross-rs/cross-toolchains HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Cache cross
        if: matrix.use_cross
        id: cache-cross
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-git-${{ steps.cross-sha.outputs.cross }}-${{ steps.cross-sha.outputs.toolchains }}

      - name: Install cross
        if: matrix.use_cross && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Restore Docker image cache
        if: matrix.use_cross
        id: cache-docker
        uses: actions/cache@v5
        with:
          path: /tmp/cross-${{ matrix.target }}-image.tar
          key: ${{ runner.os }}-cross-image-${{ matrix.target }}-${{ steps.cross-sha.outputs.cross }}-${{ steps.cross-sha.outputs.toolchains }}

      - name: Load Docker image
        if: matrix.use_cross && steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/cross-${{ matrix.target }}-image.tar

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --locked

      - name: Save Docker image
        if: matrix.use_cross && steps.cache-docker.outputs.cache-hit != 'true'
        run: docker save ghcr.io/cross-rs/${{ matrix.target }}:main -o /tmp/cross-${{ matrix.target }}-image.tar

      - name: Rename artifact
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            ext=".exe"
          fi
          mv target/${{ matrix.target }}/release/apk-toolbox${ext} target/${{ matrix.target }}/release/apk-toolbox-${{ matrix.artifact }}${ext}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/apk-toolbox-${{ matrix.artifact }}*
          if-no-files-found: ignore

  release:
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Release v${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}