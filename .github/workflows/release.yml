name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
            use_cross: false

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: linux-x64-musl
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact: android-arm64
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
            use_cross: false

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache cross
        if: matrix.use_cross
        id: cache-cross
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-bin

      - name: Install cross
        if: matrix.use_cross && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            ext=".exe"
          fi
          mv target/${{ matrix.target }}/release/apk-toolbox${ext} target/${{ matrix.target }}/release/apk-toolbox-${{ matrix.artifact }}${ext}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/apk-toolbox-${{ matrix.artifact }}*
          if-no-files-found: ignore

  release:
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Release
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}